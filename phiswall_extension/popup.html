<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --primary: #ff5f00;
            --secondary: #0a0a0a;
            --bg: #ffffff;
            --text: #0a0a0a;
            --card-bg: #f8f8f8;
            --desc-text: #444;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --primary: #ff7326;
                --secondary: #ffffff;
                --bg: #121212;
                --text: #e0e0e0;
                --card-bg: #1e1e1e;
                --desc-text: #aaaaaa;
            }
        }

        body {
            width: 320px;
            max-width: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
        }

        .header {
            background: linear-gradient(135deg, var(--primary) 50%, var(--bg) 50.5%);
            padding: 24px;
            color: white;
            position: relative;
        }

        @media (prefers-color-scheme: dark) {
            .header {
                background: linear-gradient(135deg, var(--primary) 50%, var(--bg) 50.5%);
            }
        }

        .header h2 {
            margin: 0;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 4px 4px 0px #0a0a0a;
        }

        .container {
            padding: 24px;
        }

        .status-card {
            background: var(--card-bg);
            border-left: 4px solid var(--primary);
            padding: 16px;
            border-radius: 4px;
            margin-bottom: 20px;
        }

        .status-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--desc-text);
            margin-bottom: 4px;
        }

        .status-value {
            font-weight: 800;
            color: var(--secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .pulse {
            width: 8px;
            height: 8px;
            background: #2ed573;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 10px #2ed573;
            animation: pulse-kf 2s infinite;
        }

        @keyframes pulse-kf {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        .footer {
            padding: 16px 24px;
            background: #0a0a0a;
            color: rgba(255, 255, 255, 0.5);
            font-size: 10px;
            font-family: monospace;
            display: flex;
            justify-content: space-between;
        }

        .desc {
            font-size: 12px;
            line-height: 1.6;
            color: var(--desc-text);
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <div class="header">
        <h2>PhishWall</h2>
    </div>
    <div class="container">
        <div class="status-card">
            <div class="status-label">Neural Engine Status</div>
            <div class="status-value" id="status-value">
                <span class="pulse"></span> ACTIVE // SECURED
            </div>
        </div>
        <p class="desc">
            PhishWall is actively monitoring your web traffic for phishing links, typosquatting, and fraudulent intent
            using neural heuristic mapping.
        </p>
    </div>
    <div class="footer">
        <span>V2.0.0</span>
        <span>ENCRYPTION_ACTIVE</span>
    </div>
    <script src="popup.js"></script>
</body>

</html>
